<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christopher Worcester | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #000; /* Black background like your screenshots */
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            align-items: center;
        }

        .logo { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem; }
        
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav a { color: #fff; text-decoration: none; font-size: 0.9rem; }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 100px 20px;
            background-image: radial-gradient(circle, #333 1px, transparent 1px);
            background-size: 30px 30px; /* This creates the dot pattern effect */
        }

        .hero img {
            width: 300px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin: 10px 0; }

        .book-btn {
            background: #fff;
            color: #000;
            padding: 10px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Gallery Sections */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin: 50px 50px 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            padding: 0 50px;
        }

        .gallery-grid img {
            width: 100%;
            height: 450px;
            object-fit: cover; /* Keeps the photos from stretching */
            filter: grayscale(20%);
            transition: 0.3s;
        }

        .gallery-grid img:hover { filter: grayscale(0%); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Christopher Worcester</div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Looks</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="hero">
        <img src="your-hero-image.jpg" alt="Christopher Worcester">
        <h1>Christopher Worcester</h1>
        <a href="#contact" class="book-btn">Book Now</a>
    </div>

    <h2 class="section-title">Portraits & Headshots</h2>
    <div class="gallery-grid">
        <img src="photo1.jpg" alt="Headshot 1">
        <img src="photo2.jpg" alt="Headshot 2">
        <img src="photo3.jpg" alt="Headshot 3">
    </div>

</body>
</html>
